name: CI

on:
  pull_request:
    branches:
      - develop
      - homol
      - main
  push:
    branches:
      - develop
      - homol
      - main

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run lint
        run: python -m ruff check .

      - name: Run typecheck
        run: python -m mypy src

      - name: Run tests
        run: python -m pytest
